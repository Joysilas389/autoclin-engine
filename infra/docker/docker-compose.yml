version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clinengine
      POSTGRES_USER: clinengine
      POSTGRES_PASSWORD: clinengine
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinengine"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: clinengine
      MINIO_ROOT_PASSWORD: clinengine_secret
    ports: ["9000:9000", "9001:9001"]
    volumes: [miniodata:/data]

  api:
    build: {context: .., dockerfile: infra/docker/Dockerfile.api}
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://clinengine:clinengine@postgres:5432/clinengine
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      S3_ENDPOINT: minio:9000
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  worker:
    build: {context: .., dockerfile: infra/docker/Dockerfile.ml}
    command: celery -A app.worker worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://clinengine:clinengine@postgres:5432/clinengine
      CELERY_BROKER_URL: redis://redis:6379/1
      S3_ENDPOINT: minio:9000
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  frontend:
    build: {context: .., dockerfile: infra/docker/Dockerfile.frontend}
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on: [api]

volumes:
  pgdata:
  miniodata:
