ore action). 8 cleaning recommendations generated with risk assessment."},{name:"Report",dur:"95ms",d:"Quality metrics computed. Trust Score: 99.1/100 (completeness 99.75, consistency 98.67, plausibility 99.17, uniqueness 100.0). Column-wise error burden: 0.12%. Pipeline duration: 6.2 seconds total."}],

methodInfo:{lof:"Local Outlier Factor compares each record's local density to its neighbors. Records in sparser regions than their neighbors are flagged. Best for detecting contextual anomalies where a value is normal globally but unusual in its local context.",robust_pca:"Decomposes data into a low-rank 'normal' component and a sparse 'corruption' component. Records with large sparse entries are flagged. Excels at finding scattered data entry errors across otherwise clean records.",autoencoder:"A neural network trained to reconstruct the input through a bottleneck. Records with high reconstruction error don't fit the learned normal patterns. Best for complex nonlinear relationships between variables.",hdbscan:"Builds a density-based cluster hierarchy and identifies noise points that don't belong to any cluster. Excellent for datasets with subpopulations of different sizes (e.g., pediatric vs adult cohorts).",isolation_forest:"Randomly partitions features and measures how few splits isolate each record. Anomalies, being rare and different, are isolated quickly. Fast and effective in high dimensions."},
narrative:"AutoClin Engine detected <b>8 anomalies</b> across 600 records, yielding a noise rate of <b>1.33%</b>. This is well below the 5% threshold typically considered acceptable for clinical trial data. The overall Data Trust Score of <b>99.1/100</b> indicates high-quality data with isolated issues rather than systemic problems.<br><br><b>Top anomaly drivers:</b> systolic_bp contributed 35.2% of total anomaly score (5 impossible values including 999 mmHg and -10 mmHg), hemoglobin contributed 28.4% (values of 55.0 and -2.0 g/dL), and age contributed 22.1% (200 years and -5 years).<br><br><b>Clinical interpretation:</b> All 5 CRITICAL findings are biologically impossible values consistent with data entry errors (extra digits, sign reversals, unit confusion). The 3 HIGH findings are extreme but require clinical verification — hemoglobin of 0.1 g/dL is at the boundary of viability.<br><br><b>Recommended next steps:</b> (1) Review the 5 CRITICAL records against source documents immediately. (2) Verify the 3 HIGH records with the clinical site. (3) After corrections, re-run the pipeline to confirm noise reduction. (4) Generate the PDF report for regulatory documentation."};

const PAGES=[{id:"dashboard",i:"📊",l:"Dashboard"},{id:"upload",i:"📁",l:"Upload"},{id:"analysis",i:"🔬",l:"Analysis"},{id:"anomalies",i:"⚠️",l:"Anomalies"},{id:"cleaning",i:"🧹",l:"Cleaning"},{id:"actlog",i:"📜",l:"Activity Log"},{id:"methods",i:"📈",l:"Methods"},{id:"benchmark",i:"🏆",l:"Benchmark"},{id:"features",i:"💡",l:"Features"},{id:"reports",i:"📄",l:"Reports"},{id:"disclaimer",i:"⚖️",l:"Disclaimer"},{id:"about",i:"👤",l:"About"}];
const nav=document.getElementById("nav");PAGES.forEach(p=>{const a=document.createElement("a");a.textContent=`${p.i} ${p.l}`;a.dataset.id=p.id;a.onclick=()=>go(p.id);if(p.id==="dashboard")a.className="on";nav.appendChild(a)});

function toggleTheme(){const h=document.documentElement,d=h.dataset.theme==="dark";h.dataset.theme=d?"light":"dark";document.getElementById("thbtn").innerHTML=d?"🌙 Dark":"☀️ Light";localStorage.setItem("t",d?"light":"dark");setTimeout(drawAll,80)}

function hdc(id,w,h){const el=document.getElementById(id);if(!el)return null;const d=window.devicePixelRatio||1;el.width=w*d;el.height=h*d;el.style.width=w+"px";el.style.height=h+"px";const c=el.getContext("2d");c.scale(d,d);return c}
function css(p){return getComputedStyle(document.documentElement).getPropertyValue(p).trim()}
const sv=s=>`<span class="sv sv-${s[0]}">${s.toUpperCase()}</span>`;
function pipeTabs(){return `<div class="pp">${D.phases.map((p,i)=>`<div class="ps" onclick="showPh(${i})">${p.name}</div>`).join("")}</div><div id="pds"></div>`}
function showPh(i){const p=D.phases[i];document.getElementById("pds").innerHTML=`<div class="ec"><div class="ec-t">Phase ${i+1}: ${p.name} (${p.dur})</div><p class="p">${p.d}</p></div>`}
function ptbl(id,h,R,o={}){window['_'+id]={h,R,o,pg:0,ps:o.ps||50,q:''};return `<div class="fr"><input placeholder="Search..." oninput="pS('${id}',this.value)" style="flex:1;min-width:50px"><select onchange="pZ('${id}',this.value)"><option value="20">20</option><option value="50" selected>50</option><option value="100">100</option><option value="9999">All</option></select></div><div id="b_${id}">${pR(id)}</div>`}
function pR(id){const d=window['_'+id];if(!d)return'';let r=d.R;if(d.q){const q=d.q.toLowerCase();r=r.filter(x=>x.some(c=>String(c).toLowerCase().includes(q)))}const t=r.length,tp=Math.ceil(t/d.ps);d.pg=Math.max(0,Math.min(d.pg,tp-1));const s=d.pg*d.ps,pr=r.slice(s,s+d.ps);let h=`<div class="tw"><table class="dt"><tr>${d.h.map(x=>`<th>${x}</th>`).join("")}</tr>`;pr.forEach(r=>{h+=`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`});h+=`</table></div><div class="pager"><span>${s+1}-${Math.min(s+d.ps,t)} of ${t}</span>`;if(tp>1){h+=` <button onclick="pP('${id}',-1)">←</button>`;for(let i=0;i<Math.min(tp,5);i++)h+=`<button class="${i===d.pg?'on':''}" onclick="pP('${id}',${i},1)">${i+1}</button>`;h+=`<button onclick="pP('${id}',1)">→</button>`}return h+`</div>`}
function pS(id,q){window['_'+id].q=q;window['_'+id].pg=0;document.getElementById('b_'+id).innerHTML=pR(id)}
function pZ(id,v){window['_'+id].ps=+v;window['_'+id].pg=0;document.getElementById('b_'+id).innerHTML=pR(id)}
function pP(id,v,a){window['_'+id].pg=a?v:window['_'+id].pg+v;document.getElementById('b_'+id).innerHTML=pR(id)}
const ct=document.getElementById("ct");
function render(id){const fn={dashboard:rD,upload:rU,analysis:rA,anomalies:rN,cleaning:rC,actlog:rL,methods:rM,benchmark:rB,features:rF,reports:rR,disclaimer:rX,about:rAb};ct.innerHTML='<div class="vw on">'+(fn[id]||rD)()+'</div>';setTimeout(drawAll,60)}
function drawAll(){drawSev();drawRadar();drawComp();drawBe();buildDist()}
function typeBars(){const tc={};D.anoms.forEach(a=>tc[a.t]=(tc[a.t]||0)+1);const ent=Object.entries(tc).sort((a,b)=>b[1]-a[1]);const mx=Math.max(...ent.map(e=>e[1]));return `<div class="type-bars">${ent.map(([t,c])=>`<div class="type-bar-row"><div class="type-bar-label">${t.replace(/_/g," ")}</div><div class="type-bar-track"><div class="type-bar-fill" style="width:${Math.max(c/mx*100,15)}%"><span class="type-bar-val">${c}</span></div></div></div>`).join("")}</div>`}

function rD(){const cc=D.anoms.filter(a=>a.s==="critical").length;return pipeTabs()+`<div class="mg"><div class="mc"><div class="lb">Rows</div><div class="vl">${D.rows}</div><div class="su">${D.cols} columns</div></div><div class="mc"><div class="lb">Anomalies</div><div class="vl" style="color:var(--err)">${D.anomalies}</div><div class="su">${cc} critical</div></div><div class="mc"><div class="lb">Noise</div><div class="vl" style="color:var(--warn)">${D.noise}%</div><div class="su">Target &lt;5%</div></div><div class="mc"><div class="lb">Trust</div><div class="vl" style="color:var(--ok)">${D.trust}</div><div class="su">out of 100</div></div><div class="mc"><div class="lb">Missingness</div><div class="vl">${D.miss}%</div><div class="su">Very low</div></div><div class="mc"><div class="lb">Plausibility</div><div class="vl" style="color:var(--ok)">${D.plaus}%</div><div class="su">Clinical range</div></div></div><div class="sec"><h2>Clinical Interpretation</h2><p class="p">${D.narrative}</p></div><div class="cr"><div class="sec"><h2>Data Trust Score</h2><p class="p">The Trust Score of ${D.trust}/100 combines completeness, consistency, clinical plausibility (${D.plaus}%), and uniqueness. ${D.trust>90?"Scores above 90 indicate analysis-ready data with minor corrections needed.":"This dataset needs attention — review flagged anomalies."}</p><div class="gg"><svg viewBox="0 0 200 120"><path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="var(--brd)" stroke-width="12" stroke-linecap="round"/><path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="var(--ok)" stroke-width="12" stroke-linecap="round" stroke-dasharray="${D.trust/100*251.2} 251.2"/><text x="100" y="82" text-anchor="middle" font-size="24" font-weight="700" fill="var(--t1)">${D.trust}</text><text x="100" y="100" text-anchor="middle" font-size="9" fill="var(--t3)">Trust Score</text></svg></div></div><div class="sec"><h2>Severity Distribution</h2><p class="p">CRITICAL = biologically impossible, must fix. HIGH = statistically extreme, verify clinically.</p><div class="cb"><canvas id="c-sev"></canvas></div></div></div><div class="sec"><h2>Anomaly Type Breakdown</h2><p class="p">Each bar shows how many records were flagged for each anomaly category.</p>${typeBars()}</div>
<div class="sec"><h2>Anomaly Score Distribution</h2><p class="p">Distribution of anomaly confidence scores. Bars near 1.0 = biologically impossible. Bars near 0.5 = moderate flags needing review. Red curve = density estimate.</p><div id="dist-chart" style="width:100%;overflow-x:auto"></div></div>`}

function rU(){return `<div class="sec"><h2>Upload Dataset</h2><p class="p">Upload any structured clinical dataset. AutoClin Engine auto-detects the format, infers column types, maps clinical fields, and runs the full 9-phase pipeline. Files over 10MB are uploaded in chunks with progress tracking.</p><div class="uz" onclick="document.getElementById('fi').click()" id="uz"><div style="font-size:20px;margin-bottom:2px">📂</div><div style="font-size:11px;font-weight:600">Drop file here or click to browse</div><div style="font-size:8px;color:var(--t3);margin-top:2px">CSV, XLSX, JSON, Parquet, TSV • Max 500MB</div><input type="file" id="fi" style="display:none" onchange="hF(this)"></div><div class="upload-prog" id="uprog" style="display:none"><div style="display:flex;justify-content:space-between;font-size:8px;color:var(--t2)"><span id="un"></span><span id="up">0%</span></div><div class="prog-bar"><div class="prog-fill" id="uf" style="width:0"></div></div></div><div id="ur" style="display:none" class="ec"><div class="ec-t">✓ Upload Complete</div><p id="ui"></p></div></div><div class="sec"><h2>Sample Datasets for Testing</h2><p class="p">Download realistic noisy clinical datasets with known injected anomalies to test AutoClin Engine. Each dataset contains different data types, structures, and anomaly patterns to verify the engine handles diverse clinical data.</p><div class="mg"><div class="mc" style="cursor:pointer;text-align:center" onclick="dlS('trial')"><div style="font-size:16px">🏥</div><div class="lb">Clinical Trial</div><div class="su">805 rows • 22 cols<br>Multi-site, labs, vitals, AEs</div></div><div class="mc" style="cursor:pointer;text-align:center" onclick="dlS('bio')"><div style="font-size:16px">🧬</div><div class="lb">Biomedical</div><div class="su">503 rows • 17 cols<br>Gene expr, proteins, text</div></div><div class="mc" style="cursor:pointer;text-align:center" onclick="dlS('ehr')"><div style="font-size:16px">🩺</div><div class="lb">Patient EHR</div><div class="su">1008 rows • 24 cols<br>Multi-dept, diagnoses, notes</div></div></div></div><div class="sec"><h2>${D._live?"Dataset: "+(D.filename||"Uploaded File"):"Current Dataset: Demo Data"}</h2><p class="p">${D._live?"Loaded "+D.rows+" records across "+D.cols+" columns. "+D.profile.filter(p=>p.clin).length+" clinical fields detected. Trust Score: "+D.trust+"/100.":"Upload a dataset above to see its profile here. Demo: 600 records, 11 columns."}</p>${ptbl('pr',["Column","Type","Nulls","Unique","Clinical","Conf"],D.profile.map(p=>[`<b>${p.col}</b>`,p.type,p.nulls+"%",p.uniq,`<span class="sv sv-l">${p.clin}</span>`,p.conf.toFixed(2)]),{ps:20})}</div>`}

function rA(){return pipeTabs()+`<div class="sec"><h2>Dataset Profile & Quality Observations</h2><p class="p">${D._live?"The profiling phase analyzed "+D.cols+" columns and identified "+D.anomalies+" anomalies ("+D.noise+"% noise). Trust Score: "+D.trust+"/100. Method: "+D.methods.join(", ")+". Mode: "+D.mode+".":"The profiling phase analyzed all 11 columns. Trust Score: "+D.trust+"/100."}</p>${ptbl('ap',["Metric","Value","Interpretation"],[["Total Rows",D.rows,D.rows>100?"Adequate for detection":"Small dataset"],["Columns",D.cols,"Detected types"],["Noise Rate",D.noise+"%",D.noise<2?"Good quality":D.noise<5?"Acceptable":"Review needed"],["Missingness",D.miss+"%",D.miss<1?"Low":D.miss<5?"Moderate":"High"],["Duplicates",D.dup+"%",D.dup==0?"None":"Review needed"],["Plausibility",D.plaus+"%",D.plaus>95?"Within ranges":"Check flags"],["Trust Score",D.trust+"/100",D.trust>90?"Analysis-ready":"Corrections needed"],["Selected Method",D.methods.join(", "),"Best composite ("+D.mode+")"],["Duration",(D.duration_ms||0)+"ms","All 9 phases complete"]],{ps:20})}</div><div class="sec"><h2>Clinical Field Map</h2><p class="p">AutoClin Engine automatically recognized clinical variable types using column name patterns (regex matching against CDISC, REDCap, and EHR naming conventions) and value-range validation against 120+ clinical reference ranges (88 canonical tests, 373 aliases). Confidence scores reflect how strongly the column matches the inferred type.</p>${ptbl('cm',["Column","Inferred Type","Clinical Category","Confidence","Validation"],D.profile.map(p=>[p.col,p.type,p.clin||"<i>none</i>",p.conf.toFixed(2),p.clin&&p.clin!=="null"?'<span class="sv sv-l">Matched</span>':'<span class="sv sv-m">Unsupervised only</span>']),{ps:20})}</div>
<div class="sec"><h2>Clinical Reference Coverage</h2><p class="p">${D.clinicalCoverage?D.clinicalCoverage.matchedCount+" of "+(D.clinicalCoverage.matchedCount+D.clinicalCoverage.skippedCount)+" columns ("+D.clinicalCoverage.coveragePct+"%) matched to clinical reference ranges. Running in Standard Mode: 142 tests, 556 aliases, 49 LOINC codes, 80+ SNOMED CT concepts. Unmatched columns use unsupervised detection only.":"Upload data to see coverage. Standard Mode: 142 tests, 49 LOINC, 80+ SNOMED CT. Enhanced Mode available for enterprise (100K+ LOINC, 350K+ SNOMED CT)."}</p>${D.clinicalCoverage?ptbl("cov",["Column","Status","Category / Reason"],(D.clinicalCoverage.matched||[]).map(m=>[m.col,'<span class="sv sv-l">Matched</span>',m.category+" (conf: "+m.confidence.toFixed(2)+")"]).concat((D.clinicalCoverage.skipped||[]).map(s=>[s.col,'<span class="sv sv-m">Skipped</span>',s.reason])),{ps:30}):""}</div>
<div class="sec"><h2>Bootstrap Stability Analysis</h2><p class="p">Each method was evaluated across 20 bootstrap resamples. High stability (>0.7) means the method consistently flags the same records regardless of sampling variation.</p>${D.stabilityDetail?ptbl("stab",["Method","Stability","Interpretation","Anomaly Discrim.","Clinical Plaus."],(D.stabilityDetail||[]).map(s=>[s.method,s.stability.toFixed(4),'<span class="sv '+(s.stability>0.7?"sv-l":s.stability>0.3?"sv-m":"sv-c")+'">'+s.interpretation+"</span>",s.anomalyDiscrimination.toFixed(4),s.clinicalPlausibility.toFixed(4)]),{ps:10}):""}</div>
<div class="sec"><h2>Borderline Cases — Why NOT Flagged</h2><p class="p">${D.borderline&&D.borderline.length?D.borderline.length+" records scored close to the anomaly threshold but were NOT flagged. These are the most likely records to become anomalies if the threshold is lowered. Consider reviewing them manually.":"No borderline cases detected — clear separation between anomalies and normal records."}</p>${D.borderline&&D.borderline.length?ptbl("bord",["Row","Score","Threshold","% of Threshold","Reason"],(D.borderline||[]).map(b=>[b.row,b.score.toFixed(4),b.threshold.toFixed(4),b.pctOfThreshold+"%",b.reason]),{ps:10}):""}</div>`}

function rN(){const ty=[...new Set(D.anoms.map(a=>a.t))];return `<div class="sec"><h2>Anomaly Explorer<span class="badge">${D.anomalies} found</span></h2><p class="p">Each flagged record is classified by type (what kind of issue), severity (clinical impact), and confidence (how certain the detection is). Click <b>▶</b> on any row to see the full clinical explanation, rationale, and recommended action. Use the filters below to focus on specific severity levels or anomaly types.</p><div class="fr"><select id="fs" onchange="fA()"><option value="">All Severities</option><option value="critical">Critical Only</option><option value="high">High Only</option></select><select id="ft" onchange="fA()"><option value="">All Types</option>${ty.map(t=>`<option value="${t}">${t.replace(/_/g," ")}</option>`).join("")}</select><input id="fq" placeholder="Search rationale..." oninput="fA()" style="flex:1;min-width:50px"></div><div id="atbl">${aT(D.anoms)}</div></div><div class="sec" id="exp" style="display:none"><h2>Clinical Explanation</h2><div id="expc"></div></div>`}
function aT(a){return ptbl('an',["Row","Type","Sev","Conf","Column",""],a.map(x=>[x.r,x.t.replace(/_/g," "),sv(x.s),x.c.toFixed(2),x.cols[0],`<button style="padding:1px 5px;border:1px solid var(--acc);background:var(--acc-bg);color:var(--acc);border-radius:3px;cursor:pointer;font-size:8px" onclick="sE(${D.anoms.indexOf(x)})">▶</button>`]),{ps:20})}
function fA(){const s=document.getElementById("fs").value,t=document.getElementById("ft").value,q=document.getElementById("fq").value.toLowerCase();document.getElementById("atbl").innerHTML=aT(D.anoms.filter(a=>(!s||a.s===s)&&(!t||a.t===t)&&(!q||a.rat.toLowerCase().includes(q))))}
function sE(i){const a=D.anoms[i];document.getElementById("exp").style.display="block";document.getElementById("expc").innerHTML=`<div class="ec"><div class="ec-t">Record #${a.r} — ${a.t.replace(/_/g," ")} (${a.s.toUpperCase()})</div><p class="p"><b>Confidence:</b> ${(a.c*100).toFixed(0)}% — ${a.c>.9?"Very high certainty this is a genuine data quality issue.":a.c>.7?"High certainty. Recommend verification.":"Moderate certainty. Clinical review advised."}</p><p class="p"><b>Flagged Column:</b> ${a.cols[0]}</p><p class="p"><b>Clinical Rationale:</b> ${a.rat}</p><p class="p"><b>Recommended Action:</b> ${a.act.replace(/_/g," ")} — ${a.risk==="manual_only"?"This requires manual review by a data manager or clinician before any correction. Do not auto-correct.":"This can be cautiously corrected (e.g., winsorize to 99th percentile) but verify against source first."}</p><p class="p"><b>Risk if Uncorrected:</b> ${a.s==="critical"?"Could bias safety analyses and lead to incorrect clinical conclusions. Priority: IMMEDIATE.":"May affect statistical summaries. Priority: review within current data cleaning cycle."}</p></div>`;document.getElementById("exp").scrollIntoView({behavior:"smooth"})}

function rC(){return `<div class="sec"><h2>Cleaning<span class="badge">${D.cleaning&&D.cleaning.length?D.cleaning.length:D.anoms.length}</span></h2><p class="p">Each recommendation includes severity and auto-clean risk. <b>MANUAL ONLY</b> = requires human review. <b>CAUTION</b> = verify against source first.</p>${ptbl('cl',["Row","Col","Action","Sev","Risk","Rationale"],(D.cleaning&&D.cleaning.length?D.cleaning:D.anoms).map(a=>[a.r||a.row,a.cols?a.cols[0]:a.col,((a.act||a.action)||"review").replace(/_/g," "),sv(a.s||a.severity),'<span class="sv '+((a.risk||a.auto_clean_risk)==="manual_only"?"sv-c":"sv-m")+'">'+(((a.risk||a.auto_clean_risk)||"").replace(/_/g," "))+'</span>',(a.rat||a.rationale)]),{ps:20})}</div><div class="sec"><h2>Cleaning Mode</h2><p class="p">Current: <b>Suggestion Only</b> (regulatory-safe). All actions require explicit approval. No data modified without consent.</p><p class="p"><b>Correct or Impute:</b> Verify against source document. If confirmed error, correct. If source unavailable, impute with clinical median.</p><p class="p"><b>Winsorize:</b> Cap extreme value at 99th percentile. Preserves record while reducing outlier impact.</p><div class="disc"><h3>Regulatory Notice</h3><p>Auto-clean applies only deterministic, reversible operations logged in the immutable audit ledger with transaction IDs, timestamps, and reproducibility metadata. Meets ICH-GCP and FDA 21 CFR Part 11 requirements.</p></div></div>`}
function rL(){return `<div class="sec"><h2>Pipeline Activity Log</h2><p class="p">This log traces every operation the AutoClin Engine performed during the 9-phase pipeline. Green entries indicate successful completions, yellow indicates warnings (potential issues detected), and red indicates critical findings. Each line shows the timestamp, phase, and specific operation. This log is part of the reproducibility record and can be exported for regulatory documentation.</p><div class="alog">${D.cleanLog.map(l=>`<div class="al-line"><span class="al-time">${l.t}</span><span class="al-phase">[${l.ph}]</span><span class="al-msg ${l.c}">${l.m}</span></div>`).join("")}</div><div class="ec" style="margin-top:8px"><div class="ec-t">Log Summary</div><p class="p">Pipeline completed in ${D.duration_ms?(D.duration_ms/1000).toFixed(1)+"s":"~6s"} across 9 phases. ${D.cleanLog.filter(l=>l.c==="al-err").length} critical findings, ${D.cleanLog.filter(l=>l.c==="al-warn").length} warnings, ${D.cleanLog.filter(l=>l.c==="al-ok").length} successful operations. No phase failures.</p></div></div>`}

function rM(){return `<div class="sec"><h2>Method Comparison & Selection</h2><p class="p">AutoClin Engine evaluated <b>5 unsupervised detection methods</b> and scored each on 6 dimensions. The method with the highest composite score is selected automatically. When top methods score within 0.05 of each other, a weighted ensemble is constructed instead.</p><h3>Why ${D.methods[0].toUpperCase()} Won</h3><p class="p">${D.methods[0].toUpperCase()} achieved the highest composite score of <b>${D.rankings[0]?D.rankings[0].comp.toFixed(4):"N/A"}</b> because it had the best balance of anomaly discrimination (separating real issues from noise), stability (consistent results across bootstrap resamples), and explainability (per-feature distance decomposition shows which columns drove each flag).</p>${ptbl('mt',["Method","Composite","NDC","AD","SS","CP","EX","CC","★"],D.rankings.map(r=>[r.m,r.comp.toFixed(4),r.ndc.toFixed(4),r.ad.toFixed(2),r.ss.toFixed(2),r.cp.toFixed(2),r.ex.toFixed(2),r.cc.toFixed(2),r.sel?"★ Selected":""]),{ps:20})}<p class="p" style="margin-top:6px"><b>AD</b>=Anomaly Discrimination (how well it separates anomalies from normal) • <b>SS</b>=Stability (consistency across resamples) • <b>CP</b>=Clinical Plausibility (overlap with reference range violations) • <b>EX</b>=Explainability (how interpretable the results are) • <b>CC</b>=Computational Cost (speed) • <b>NDC</b>=Noise Detection Confidence (0.6×AD + 0.4×SS)</p></div><div class="sec"><h2>What Each Method Does</h2>${Object.entries(D.methodInfo).map(([k,v])=>`<h3>${k.replace(/_/g," ")}</h3><p class="p">${v}</p>`).join("")}</div><div class="cr"><div class="sec"><h2>Radar</h2><div class="cb"><canvas id="c-radar"></canvas></div></div><div class="sec"><h2>Composite Scores</h2><div class="cb"><canvas id="c-comp"></canvas></div></div></div>`}

function rB(){return `<div class="sec"><h2>🏆 Benchmark — Real-World Dataset Comparison</h2><p class="p">AutoClin Engine was tested on 3 different clinical dataset types to evaluate how the pipeline adapts to diverse data characteristics. Key finding: <b>different methods win for different data</b> — the auto-selection system correctly identifies the best approach for each dataset without manual tuning.</p>${ptbl('bm',["Dataset","Rows","Anomalies","Noise%","Trust","Winner","Mode"],D.bench.map(b=>[b.ds,b.rows,b.anom,b.noise+"%",b.trust,b.method,b.mode]),{ps:10})}<h3>Interpretation</h3><p class="p"><b>Clinical Trial (Trust 98.6):</b> Autoencoder won because the multi-site structure creates complex nonlinear patterns that reconstruction-based methods handle well. 9 anomalies detected from 12 injected — high recall with low false positives.</p><p class="p"><b>Biomedical Study (Trust 98.7):</b> No single method dominated, so the system automatically built a 3-method weighted ensemble (LOF + Autoencoder + Isolation Forest). This is the expected behavior when methods disagree — the ensemble arbitrates.</p><p class="p"><b>Patient EHR (Trust 76.7):</b> LOF won for this high-dimensional (24-column) dataset with diverse clinical notes. The lower trust score reflects the 20 injected anomalies across multiple clinical domains — more anomalies = lower consistency score.</p></div><div class="sec"><h2>Trust Score Comparison</h2><div class="cb"><canvas id="c-bench"></canvas></div></div>`}

function rF(){return `<div class="sec"><h2>💡 Innovative Features</h2><p class="p">AutoClin Engine goes beyond traditional data quality tools with features designed for the specific challenges of clinical research, multi-site trials, and healthcare data. These innovations are what attract global health companies, CROs, and pharmaceutical organizations.</p><div class="feat-grid"><div class="feat-card"><div class="fi">🧬</div><h4>Clinical Noise Fingerprint</h4><p class="p">Every dataset gets a unique compact vector encoding the types, distribution, and severity of noise found. Compare fingerprints across studies to track quality trends over time and identify sites that need targeted monitoring.</p></div><div class="feat-card"><div class="fi">🛡️</div><h4>Data Trust Score (0–100)</h4><p class="p">A single metric combining completeness, consistency, plausibility, uniqueness, and stability. Displayed as a gauge on every dashboard. Regulators and sponsors can use this as a certified quality indicator.</p></div><div class="feat-card"><div class="fi">🗺️</div><h4>Noise Genome Map</h4><p class="p">A heatmap where columns × visits reveals structural patterns — like a specific lab column becoming noisy after visit 5, suggesting instrument calibration drift or protocol changes mid-study.</p></div><div class="feat-card"><div class="fi">👥</div><h4>Counterfactual Clean Twin</h4><p class="p">For every flagged record, see its nearest plausible "clean version" side by side. Clinicians instantly understand what's wrong and what the corrected record would look like.</p></div><div class="feat-card"><div class="fi">🔮</div><h4>Noise Reduction Simulator</h4><p class="p">Before committing to any cleaning action, preview the impact: how distributions change, whether new artifacts appear, and the predicted trust score improvement.</p></div><div class="feat-card"><div class="fi">🧑‍⚕️</div><h4>Clinical Adjudication Lane</h4><p class="p">Ambiguous anomalies (where methods disagree) are routed to a dedicated review interface. Clinicians see explanation cards with one-click accept/reject/modify. Decisions feed back for future improvement.</p></div><div class="feat-card"><div class="fi">💎</div><h4>Rare-but-Real Preservation</h4><p class="p">Cross-references flagged values against clinical knowledge bases of known rare conditions. A hemoglobin of 2.1 g/dL is extreme but occurs in severe aplastic anemia — the engine annotates rather than removes.</p></div><div class="feat-card"><div class="fi">📋</div><h4>Data Quality Passport</h4><p class="p">A machine-readable JSON certificate attached to every cleaned dataset: methods applied, noise reduction achieved, confidence level, auto vs manual changes, full audit trail link. Submit alongside regulatory filings.</p></div><div class="feat-card"><div class="fi">📡</div><h4>Site Drift Radar</h4><p class="p">Radar chart visualization detecting inter-site data quality variation. Sites with polygons deviating from the mean are flagged for targeted monitoring — essential for multi-center clinical trials.</p></div><div class="feat-card"><div class="fi">🔒</div><h4>Federated Quality Scoring</h4><p class="p">For institutions that cannot pool raw patient data: run anomaly detection locally at each site, share only aggregate quality scores centrally. HIPAA/GDPR-safe cross-site benchmarking without data exposure.</p></div><div class="feat-card"><div class="fi">⏪</div><h4>Cleaning Replay Mode</h4><p class="p">Step through every transformation chronologically. See the dataset state at each point with the rationale for each change. Complete reproducibility for regulatory audits and peer review.</p></div><div class="feat-card"><div class="fi">🧠</div><h4>Unsupervised Text Intelligence</h4><p class="p">Detects anomalies in free-text columns (AE terms, clinical notes, medication names) using Shannon entropy, character composition analysis, TF-IDF with SVD, and pattern flags — no pretrained models needed.</p></div>

function rX(){return `<div class="sec"><h2>⚖️ Important Disclaimer</h2><div class="disc"><h3>REGULATORY & CLINICAL NOTICE</h3><p>AutoClin Engine is an automated unsupervised machine learning data quality assessment tool. All findings, recommendations, and quality scores are produced algorithmically and should <b>NOT</b> be interpreted as definitive clinical judgments or regulatory determinations.</p></div><h3>Scope of Use</h3><p class="p">AutoClin Engine is designed to assist — not replace — qualified clinical data managers, biostatisticians, and clinicians in identifying potential data quality issues. The tool accelerates the detection process but all flagged items require human review and adjudication before any corrections are applied to clinical datasets.</p><h3>False Positive Risk</h3><p class="p">Unsupervised methods detect statistical anomalies, not clinical errors. A statistically unusual value may be clinically valid (e.g., extreme but real lab values in critically ill patients). The Rare-but-Real Preservation Engine mitigates but does not eliminate this risk. Users should always verify flags against source documents.</p><h3>Auto-Cleaning Limitations</h3><p class="p">In auto-clean mode, only deterministic and fully reversible operations are applied: unit conversions, encoding normalization, date format standardization, and exact duplicate removal. Value imputation, outlier removal, and record merging are NEVER auto-applied — they require explicit user approval. Every transformation is logged in the immutable audit ledger.</p><h3>Regulatory Compliance</h3><p class="p">AutoClin Engine is designed with regulatory awareness for ICH-GCP (International Council for Harmonisation Good Clinical Practice), FDA 21 CFR Part 11 (electronic records), HIPAA (US health data privacy), and GDPR (EU data protection). However, the tool itself is not FDA-cleared or CE-marked. Users remain fully responsible for ensuring compliance with all applicable regulations in their jurisdiction.</p><h3>Data Privacy</h3><p class="p">AutoClin Engine does not retain, transmit, or store patient data beyond the active user session. No data is sent to external servers in the default configuration. Users deploying the tool are responsible for ensuring appropriate de-identification, access controls, and data handling procedures per their institutional policies.</p><h3>No Warranty</h3><p class="p">AutoClin Engine is provided "as-is" without warranty of any kind, express or implied. The developers make no guarantees regarding the completeness, accuracy, or clinical appropriateness of anomaly detection results. Users should independently validate all results against source documents and clinical judgment.</p></div>`}

function rAb(){return `<div class="sec"><h2>About the Developer</h2><div class="ab"><div class="av">SJA</div><div class="ai"><h3>Dr. Silas Joy Agbesi</h3><div class="rl">Data Scientist Intern • Medical Officer • Deputy Clinical Coordinator</div><p class="p">Dr. Silas Joy Agbesi is a medical professional with a deep passion for applying data science and machine learning to improve healthcare data quality worldwide. As a Medical Officer and currently serving as Deputy Clinical Coordinator, Dr. Agbesi brings a rare combination of hands-on clinical expertise and technical data science skill to the development of AutoClin Engine.</p><p class="p">His clinical background ensures that the automated quality checks are grounded in real-world medical knowledge — understanding that a hemoglobin of 2 g/dL, while extreme, can occur in severe aplastic anemia, and shouldn't be blindly removed. His data science training enables the implementation of sophisticated unsupervised detection methods that work without labeled training data.</p><p class="p">Dr. Agbesi's work bridges the gap between clinical practice and data-driven innovation, ensuring that automated quality tools remain clinically grounded, explainable, and safe for real-world healthcare applications across diverse global health settings.</p></div></div></div><div class="sec"><h2>About AutoClin Engine</h2><p class="p">AutoClin Engine is a global-grade, cloud-native Progressive Web Application that automates data quality assurance for clinical research, clinical trials, hospital patient care, biomedical studies, and mixed healthcare datasets from anywhere in the world.</p><p class="p">The platform ingests structured datasets in virtually any format — CSV, Excel, Parquet, JSON, REDCap exports, EDC clinical trial data — and automatically profiles, preprocesses, detects noise and outliers using 5+ unsupervised ML methods, scores method confidence, selects the optimal detection strategy, recommends cleaning actions, and generates professional reports with before-versus-after quality metrics.</p><h3>Technology Stack</h3><p class="p"><b>Frontend:</b> Single-page PWA with responsive design, dark/light mode, offline support via service worker.<br><b>Backend:</b> Python FastAPI with async Celery workers, PostgreSQL database, MinIO object storage, Redis task queue.<br><b>ML Pipeline:</b> scikit-learn, PyTorch, HDBSCAN, custom Robust PCA (ALM solver), text feature extraction.<br><b>Reporting:</b> ReportLab PDF, openpyxl Excel, python-docx Word, matplotlib charts.<br><b>Deployment:</b> Docker Compose, Kubernetes-ready Helm charts, Netlify (frontend) + Render (backend).</p><h3>Version</h3><p class="p">AutoClin Engine v1.3.0 — March 2026. Features: 5 detection methods, 19-category anomaly taxonomy, 142 clinical reference tests (556 aliases), 49 LOINC codes, 80+ SNOMED CT concepts, 32 UCUM unit conversions, full explainability framework with transparency features. Enhanced Clinical Mode (enterprise) supports full LOINC (100K+ codes) and SNOMED CT (350K+ concepts) via SQLite.</p></div>`}

async function hF(input){const f=input.files[0];if(!f)return;
  document.getElementById("uprog").style.display="block";
  document.getElementById("un").textContent=f.name;
  document.getElementById("uf").style.width="10%";
  document.getElementById("up").textContent="Uploading...";
  
  try{
    // Upload to backend
    const form=new FormData();form.append("file",f);
    document.getElementById("uf").style.width="30%";
    document.getElementById("up").textContent="Uploading to server...";
    
    const resp=await fetch(API_URL+"/api/v1/analyze",{method:"POST",body:form});
    document.getElementById("uf").style.width="60%";
    document.getElementById("up").textContent="Running ML pipeline...";
    
    if(!resp.ok){const err=await resp.json().catch(()=>({detail:"Server error"}));throw new Error(err.detail||"Analysis failed")}
    
    const result=await resp.json();
    document.getElementById("uf").style.width="90%";

    // OVERWRITE D with real results — ALL fields
    D.rows=result.rows||D.rows;D.cols=result.cols||D.cols;D.anomalies=result.anomalies!=null?result.anomalies:D.anomalies;D.noise=result.noise!=null?result.noise:D.noise;
    D.trust=result.trust!=null?result.trust:D.trust;D.mode=result.mode||D.mode;D.methods=result.methods||D.methods;
    D.miss=result.miss!=null?result.miss:D.miss;D.dup=result.dup!=null?result.dup:D.dup;D.plaus=result.plaus!=null?result.plaus:D.plaus;
    if(result.rankings&&result.rankings.length)D.rankings=result.rankings;
    if(result.anoms)D.anoms=result.anoms;
    if(result.profile&&result.profile.length)D.profile=result.profile;
    if(result.phases&&result.phases.length)D.phases=result.phases;
    if(result.cleanLog&&result.cleanLog.length)D.cleanLog=result.cleanLog;
    if(result.narrative)D.narrative=result.narrative;
    if(result.cleaning)D.cleaning=result.cleaning;
    if(result.filename)D.filename=result.filename;
    if(result.duration_ms)D.duration_ms=result.duration_ms;
    if(result.clinicalCoverage)D.clinicalCoverage=result.clinicalCoverage;
    if(result.borderline)D.borderline=result.borderline;
    if(result.stabilityDetail)D.stabilityDetail=result.stabilityDetail;
    if(result.beforeAfter)D.beforeAfter=result.beforeAfter;
    if(result.filename)D.filename=result.filename;

    document.getElementById("up").textContent="Complete!";
    document.getElementById("ur").style.display="block";
    document.getElementById("ui").innerHTML=`<b>${f.name}</b> analyzed: <b>${result.anomalies}</b> anomalies found, Trust Score <b>${result.trust}</b>/100. <a href="#" onclick="go('dashboard');return false" style="color:var(--acc);font-weight:600">View Results →</a>`;

function dlS(type){
  let csv,name;
  if(type==='trial'){
    name='sample_clinical_trial.csv';
    csv='subject_id,site_id,treatment_arm,visit_number,visit_date,age_years,sex,bmi,systolic_bp,diastolic_bp,heart_rate,temperature_c,hemoglobin_gdl,wbc_10e3ul,creatinine_mgdl,glucose_mgdl,ae_term,ae_severity,notes\n';
    const sites=["SITE-US-001","SITE-UK-002","SITE-DE-003"],arms=["Placebo","Drug_Low","Drug_High"],aes=["None","Headache","Nausea","Fatigue","Dizziness","Rash"];
    for(let p=1;p<=200;p++){const site=sites[p%3],arm=arms[p%3],age=25+Math.floor(Math.random()*50),sex=p%2?"M":"F";
      for(let v=1;v<=4;v++){const sbp=Math.round(125+Math.random()*30-15),dbp=Math.round(78+Math.random()*20-10),hr=Math.round(72+Math.random()*20-10),temp=(36.5+Math.random()*.6).toFixed(1),hgb=(sex==="M"?13.5:12+Math.random()*3-1.5).toFixed(1),wbc=(7.5+Math.random()*4-2).toFixed(1),cr=(1+Math.random()*.6-.3).toFixed(2),gluc=Math.round(95+Math.random()*40-20),ae=aes[Math.floor(Math.random()*6)],sev=ae!=="None"?(Math.random()>.7?"Moderate":"Mild"):"";
      csv+=`SUBJ-${String(p).padStart(4,'0')},${site},${arm},${v},2025-${String(1+v*2).padStart(2,'0')}-${String(1+Math.floor(Math.random()*27)).padStart(2,'0')},${age},${sex},${(22+Math.random()*8).toFixed(1)},${sbp},${dbp},${hr},${temp},${hgb},${wbc},${cr},${gluc},${ae},${sev},\n`}}
    // Inject anomalies at RANDOM positions each time
    let lines=csv.split('\n');const hdr=lines[0];lines=lines.slice(1).filter(l=>l.trim());
    const ri=()=>Math.floor(Math.random()*lines.length);
    for(let j=0;j<4;j++){const i=ri();if(lines[i]){let c=lines[i].split(',');c[8]=[999,-10,350,450,0,-25,888][Math.floor(Math.random()*7)];lines[i]=c.join(',')}}
    for(let j=0;j<3;j++){const i=ri();if(lines[i]){let c=lines[i].split(',');c[12]=[55,-2,0.1,99,-5,0][Math.floor(Math.random()*6)];lines[i]=c.join(',')}}
    for(let j=0;j<3;j++){const i=ri();if(lines[i]){let c=lines[i].split(',');c[5]=[200,-5,999,0,-10,300][Math.floor(Math.random()*6)];lines[i]=c.join(',')}}
    for(let j=0;j<2;j++){const i=ri();if(lines[i]){let c=lines[i].split(',');c[15]=[5000,0,-100,9999][Math.floor(Math.random()*4)];lines[i]=c.join(',')}}
    csv=hdr+'\n'+lines.join('\n');
  } else if(type==='bio'){
    name='sample_biomedical_study.csv';
    csv='sample_id,study_group,age,sex,tissue_type,gene_expr_TP53,gene_expr_BRCA1,gene_expr_EGFR,protein_CRP,protein_IL6,bmi,smoking_status,diabetes,tumor_stage,lab_notes\n';
    for(let i=1;i<=500;i++){const grp=Math.random()>.4?"Case":"Control",age=30+Math.floor(Math.random()*45),sex=Math.random()>.5?"M":"F",tissue=["Blood","Tissue","CSF","Urine"][Math.floor(Math.random()*4)];
    csv+=`BIO-${String(i).padStart(5,'0')},${grp},${age},${sex},${tissue},${(5.2+Math.random()*3-1.5).toFixed(2)},${(3.8+Math.random()*2.4-1.2).toFixed(2)},${(6.1+Math.random()*4-2).toFixed(2)},${(Math.exp(1+Math.random()*1.5)).toFixed(2)},${(Math.exp(.5+Math.random()*2)).toFixed(2)},${(27+Math.random()*10-5).toFixed(1)},${["Never","Former","Current"][Math.floor(Math.random()*3)]},${["No","Yes","Type1","Type2"][Math.floor(Math.random()*4)]},${grp==="Case"?["I","II","III","IV"][Math.floor(Math.random()*4)]:""},${["","Sample hemolyzed","QC pass","Lipemic"][i%4]}\n`}
  } else {
    name='sample_patient_care.csv';
    csv='mrn,encounter_id,department,admission_date,age,sex,weight_kg,height_cm,systolic_bp,diastolic_bp,heart_rate,resp_rate,spo2_pct,temperature_c,hemoglobin,wbc,creatinine,sodium,potassium,primary_dx,discharge_status,clinical_notes\n';
    const depts=["Emergency","Cardiology","Internal Med","Surgery","Pediatrics","Oncology"],dxs=["Chest Pain","Pneumonia","Heart Failure","Fracture","Anemia","Hypertension","DKA","Sepsis"];
    for(let i=1;i<=1000;i++){const dept=depts[Math.floor(Math.random()*6)],age=1+Math.floor(Math.random()*90),sex=Math.random()>.5?"M":"F";
    csv+=`MRN-${100000+i},ENC-${String(i).padStart(6,'0')},${dept},2025-${String(1+i%12).padStart(2,'0')}-${String(1+i%28).padStart(2,'0')},${age},${sex},${(70+Math.random()*30-15).toFixed(1)},${Math.round(170+Math.random()*20-10)},${Math.round(125+Math.random()*36-18)},${Math.round(78+Math.random()*24-12)},${Math.round(80+Math.random()*30-15)},${Math.round(16+Math.random()*6-3)},${Math.min(100,(97+Math.random()*4-2)).toFixed(1)},${(36.8+Math.random()*1-.5).toFixed(1)},${(13+Math.random()*4-2).toFixed(1)},${(8+Math.random()*6-3).toFixed(1)},${(1+Math.random()*.8-.4).toFixed(2)},${Math.round(140+Math.random()*8-4)},${(4.2+Math.random()*1-.5).toFixed(1)},${dxs[Math.floor(Math.random()*8)]},${["Home","Rehab","Transfer","AMA","Expired"][Math.floor(Math.random()*5)]},${["Stable","Improving","Oxygen needed","Labs pending","Follow-up 2wk",""][Math.floor(Math.random()*6)]}\n`}
  }
  const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);
}
function dlR(t){
if(t==='pdf'){if(!D._live){alert('Upload a dataset first');return}window.open(API_URL+'/api/v1/report/pdf','_blank');return}
if(t==='xlsx'){if(!D._live){alert('Upload a dataset first');return}window.open(API_URL+'/api/v1/report/excel','_blank');return}
let c;if(t==='csv'){c="row,type,severity,confidence,column,rationale,action,risk\n";(D.cleaning||D.anoms).forEach(a=>{c+=((a.r||a.row)+`,"${a.t||a.type}","${a.s||a.severity}",${a.c||a.confidence},"${a.cols?a.cols[0]:a.col}","${(a.rat||a.rationale)||''}","${(a.act||a.action)||''}","${(a.risk||a.auto_clean_risk)||''}"\n`)});dl(c,'autoclin_anomaly_log.csv','text/csv')}
else if(t==='json'){dl(JSON.stringify(D,null,2),'autoclin_report.json','application/json')}}
function dl(c,n,m){const b=new Blob([c],{type:m}),u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download=n;a.click();URL.revokeObjectURL(u)}

function drawSev(){const ctx=hdc("c-sev",220,160);if(!ctx)return;const counts={};D.anoms.forEach(a=>counts[a.s]=(counts[a.s]||0)+1);const ent=Object.entries(counts);const total=ent.reduce((s,[,v])=>s+v,0);const cols={critical:"#dc2626",high:"#ef4444",medium:"#d97706",low:"#16a34a"};let start=-Math.PI/2;const cx=110,cy=72,r=52,tc=css("--t1");ent.forEach(([s,c])=>{const sl=c/total*2*Math.PI;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+sl);ctx.fillStyle=cols[s]||"#94a3b8";ctx.fill();const mid=start+sl/2;ctx.fillStyle=tc;ctx.font="bold 10px -apple-system,sans-serif";ctx.textAlign="center";ctx.fillText(`${s} (${c})`,cx+Math.cos(mid)*(r+17),cy+Math.sin(mid)*(r+17)+3);start+=sl})}
function drawRadar(){const ctx=hdc("c-radar",240,240);if(!ctx)return;const cx=120,cy=125,r=80,dims=["AD","SS","CP","EX","CC"],n=dims.length,tc=css("--t1"),bc=css("--brd");[.25,.5,.75,1].forEach(s=>{ctx.beginPath();for(let i=0;i<=n;i++){const a=-Math.PI/2+i*(2*Math.PI/n),x=cx+Math.cos(a)*r*s,y=cy+Math.sin(a)*r*s;i?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.strokeStyle=bc;ctx.lineWidth=.5;ctx.stroke()});ctx.fillStyle=tc;ctx.font="9px -apple-system,sans-serif";ctx.textAlign="center";dims.forEach((d,i)=>{const a=-Math.PI/2+i*(2*Math.PI/n);ctx.fillText(d,cx+Math.cos(a)*(r+12),cy+Math.sin(a)*(r+12)+3)});const mc=["#3b82f6","#ef4444","#22c55e","#f59e0b","#8b5cf6"];D.rankings.forEach((m,mi)=>{const v=[m.ad,m.ss,m.cp,m.ex,m.cc];ctx.beginPath();v.forEach((val,i)=>{const a=-Math.PI/2+i*(2*Math.PI/n),x=cx+Math.cos(a)*r*val,y=cy+Math.sin(a)*r*val;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.closePath();ctx.strokeStyle=mc[mi];ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle=mc[mi]+"22";ctx.fill()});ctx.font="8px -apple-system,sans-serif";ctx.textAlign="left";D.rankings.forEach((m,i)=>{const y=3+i*10;ctx.fillStyle=mc[i];ctx.fillRect(2,y,6,6);ctx.fillStyle=tc;ctx.fillText(m.m+(m.sel?" ★":""),11,y+5)})}
function drawComp(){const ctx=hdc("c-comp",240,170);if(!ctx)return;const bw=28,gap=12,sx=18,mh=125,tc=css("--t1");D.rankings.forEach((m,i)=>{const x=sx+i*(bw+gap),h=m.comp*mh;ctx.fillStyle=m.sel?"#3b82f6":"#94a3b8";ctx.beginPath();ctx.roundRect(x,155-h,bw,h,3);ctx.fill();ctx.fillStyle=tc;ctx.font="7px -apple-system,sans-serif";ctx.textAlign="center";ctx.fillText(m.m,x+bw/2,166);ctx.font="bold 8px -apple-system,sans-serif";ctx.fillText(m.comp.toFixed(3),x+bw/2,149-h)})}
function drawBe(){const ctx=hdc("c-bench",320,150);if(!ctx)return;const tc=css("--t1"),bw=50,gap=30,sx=40;const colors=["#3b82f6","#22c55e","#f59e0b"];D.bench.forEach((b,i)=>{const x=sx+i*(bw+gap),h=b.trust/100*115;ctx.fillStyle=colors[i];ctx.beginPath();ctx.roundRect(x,138-h,bw,h,3);ctx.fill();ctx.fillStyle=tc;ctx.font="8px -apple-system,sans-serif";ctx.textAlign="center";ctx.fillText(b.ds.split(" ").slice(0,2).join(" "),x+bw/2,150);ctx.font="bold 10px -apple-system,sans-serif";ctx.fillText(b.trust,x+bw/2,132-h)})}
function buildDist(){
const el=document.getElementById("dist-chart");if(!el)return;
const scores=(D.cleaning||D.anoms||[]).map(a=>a.c||a.confidence||0).filter(s=>s>0).sort((a,b)=>a-b);
if(!scores.length){el.innerHTML='<p style="color:var(--t3);font-size:11px;text-align:center;padding:20px">Upload data to see distribution</p>';return}
// Bin scores into 10 bins
const bins=10,counts=new Array(bins).fill(0);
scores.forEach(s=>{const b=Math.min(Math.floor(s*bins),bins-1);counts[b]++});
const maxC=Math.max(...counts,1);
// KDE for SVG curve
const bw=0.1,nPts=50,kde=[];
for(let j=0;j<=nPts;j++){const xv=j/nPts;let d=0;scores.forEach(s=>{const u=(xv-s)/bw;d+=Math.exp(-0.5*u*u)});d/=(scores.length*bw*Math.sqrt(2*Math.PI));kde.push(d)}
const maxD=Math.max(...kde,0.001);
// SVG path
const svgH=100,svgPad=2;
let path="M 0 "+svgH;
kde.forEach((d,i)=>{const x=(i/nPts)*100;const y=svgH-svgPad-(d/maxD)*(svgH-svgPad*2)*0.85;path+=" L "+x.toFixed(1)+" "+y.toFixed(1)});
path+=" L 100 "+svgH+" Z";
let curveLine="";
kde.forEach((d,i)=>{const x=(i/nPts)*100;const y=svgH-svgPad-(d/maxD)*(svgH-svgPad*2)*0.85;curveLine+=(i===0?"M ":"L ")+x.toFixed(1)+" "+y.toFixed(1)+" "});
// Severity colors
function bc(i){if(i>=8)return"var(--err)";if(i>=6)return"#ef4444";if(i>=4)return"var(--warn)";return"var(--ok)"}
// Build HTML
let html='<div style="position:relative;width:100%;padding:0">';
// SVG overlay for bell curve
html+='<svg viewBox="0 0 100 '+svgH+'" preserveAspectRatio="none" style="position:absolute;top:0;left:0;width:100%;height:120px;z-index:2;pointer-events:none">';
html+='<path d="'+path+'" fill="rgba(220,38,38,0.06)" />';
html+='<path d="'+curveLine+'" fill="none" stroke="#dc2626" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" />';
// Median line
const med=scores[Math.floor(scores.length/2)]||0.5;
html+='<line x1="'+(med*100)+'" y1="2" x2="'+(med*100)+'" y2="'+svgH+'" stroke="var(--t3)" stroke-width="0.3" stroke-dasharray="1.5 1" />';
html+='</svg>';
// Bar container
html+='<div style="display:flex;align-items:flex-end;gap:2px;height:120px;position:relative;z-index:1">';
counts.forEach((c,i)=>{
const pct=Math.max(c>0?4:0,(c/maxC)*100);
html+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">';
if(c>0)html+='<div style="font-size:9px;font-weight:700;color:var(--t1);margin-bottom:2px">'+c+'</div>';
html+='<div style="width:100%;height:'+pct+'%;background:'+bc(i)+';border-radius:2px 2px 0 0;min-height:'+(c>0?3:0)+'px;opacity:0.85"></div>';
html+='</div>';
});
html+='</div>';
// X axis labels
html+='<div style="display:flex;justify-content:space-between;padding:4px 0 0;font-size:8px;color:var(--t3)">';
for(let i=0;i<=10;i+=2)html+='<span>'+(i/10).toFixed(1)+'</span>';
html+='</div>';
html+='<div style="text-align:center;font-size:8px;color:var(--t3);margin-top:2px">Confidence Score</div>';
// Legend
html+='<div style="display:flex;gap:10px;justify-content:center;margin-top:6px;font-size:8px;color:var(--t3)">';
html+='<span><span style="display:inline-block;width:8px;height:8px;background:var(--ok);border-radius:1px;vertical-align:middle;margin-right:2px"></span>Low</span>';
html+='<span><span style="display:inline-block;width:8px;height:8px;background:var(--warn);border-radius:1px;vertical-align:middle;margin-right:2px"></span>Med</span>';
html+='<span><span style="display:inline-block;width:8px;height:8px;background:#ef4444;border-radius:1px;vertical-align:middle;margin-right:2px"></span>High</span>';
html+='<span><span style="display:inline-block;width:8px;height:8px;background:var(--err);border-radius:1px;vertical-align:middle;margin-right:2px"></span>Crit</span>';
html+='<span><span style="display:inline-block;width:16px;height:2px;background:#dc2626;vertical-align:middle;margin-right:2px"></span>KDE</span>';
html+='</div>';
html+='</div>';
el.innerHTML=html;
}
render("dashboard");
</script>
